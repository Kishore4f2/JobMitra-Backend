# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://mainline.proxy.rlwy.net:47808/job_portal?allowMultiQueries=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:RuofrQBcgYMZSkHKIqOEKsYcipBIUXpA}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema Initialization
